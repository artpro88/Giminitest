<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GiminiTest - Next-Gen Tech</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css?v=2">
  <style>
    .odds-widget {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
      margin-top: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .race-card {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      text-align: left;
    }
    .odds-value {
      color: #0d6efd;
      font-weight: bold;
    }
    .refresh-badge {
      font-size: 0.8rem;
      opacity: 0.7;
    }
  </style>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-bs-theme', savedTheme);
    })();
  </script>
</head>
<body>
  <nav class="navbar navbar-expand-lg fixed-top border-bottom border-secondary">
    <div class="container">
      <a class="navbar-brand fw-bold text-gradient" href="/">GiminiTest</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item"><a class="nav-link active" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
          <li class="nav-item ms-lg-3">
            <button id="theme-toggle" class="btn btn-sm" title="Toggle theme">
              <span id="theme-icon">🌙</span>
            </button>
          </li>
          <li class="nav-item"><a class="btn btn-outline-primary ms-lg-3" href="#">Get Started</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="hero-section text-center">
    <video autoplay muted loop playsinline class="video-background" poster="https://images.unsplash.com/photo-1590740693444-4861858e8b09?auto=format&fit=crop&w=1920&q=80">
      <source src="https://assets.mixkit.co/videos/preview/mixkit-aerial-view-of-a-mountain-landscape-with-a-river-4284-large.mp4" type="video/mp4">
      <source src="https://vjs.zencdn.net/v/oceans.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <div class="hero-overlay"></div>
    <div class="container hero-content">
      <h1 class="display-1 fw-bold mb-4 tracking-tight">Gibraltar <span class="text-gradient">Majesty</span></h1>
      <p class="lead mb-5 mx-auto" style="max-width: 600px; color: #e0e0e0;">
        Experience the breathtaking views and iconic landmarks of Gibraltar through our cinematic digital portal.
      </p>
      
      <!-- Horse Racing Odds Widget -->
      <div class="odds-widget mx-auto" style="max-width: 600px;">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h4 class="mb-0">🏇 Horse Racing Odds</h4>
          <span class="refresh-badge" id="last-updated">Updating...</span>
        </div>
        <div id="odds-container">
          <div class="text-center py-4">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-center gap-3 mt-4">
        <a href="/about" class="btn btn-primary btn-lg px-4 py-3">Discover More</a>
        <a href="#" class="btn btn-outline-light btn-lg px-4 py-3">Virtual Tour</a>
      </div>
    </div>
  </section>

  <footer class="py-5 border-top border-secondary text-center">
    <div class="container">
      <p class="text-secondary mb-0">&copy; 2026 GiminiTest. Built with Passion.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Theme Toggle
      const toggle = document.getElementById('theme-toggle');
      const icon = document.getElementById('theme-icon');
      const html = document.documentElement;

      const updateIcon = (theme) => {
        icon.textContent = theme === 'dark' ? '🌙' : '☀️';
      };

      updateIcon(html.getAttribute('data-bs-theme'));

      toggle.addEventListener('click', () => {
        const currentTheme = html.getAttribute('data-bs-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        
        html.setAttribute('data-bs-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateIcon(newTheme);
      });

      // Odds Fetching Logic
      async function fetchOdds() {
        const container = document.getElementById('odds-container');
        try {
          const response = await fetch('/api/odds');
          const resData = await response.json();
          if (resData.ok) {
            parseAndDisplayOdds(resData.data);
            document.getElementById('last-updated').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
          } else {
            container.innerHTML = `<div class="text-center py-3 text-warning">${resData.error || 'Waiting for data...'}</div>`;
          }
        } catch (err) {
          console.error('Fetch error:', err);
          container.innerHTML = `<div class="text-center py-3 text-danger">Server connection error.</div>`;
        }
      }

      function parseAndDisplayOdds(text) {
        const container = document.getElementById('odds-container');
        if (!text) {
          container.innerHTML = '<div class="text-center py-3">Empty data received.</div>';
          return;
        }

        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        let html = '';
        let foundNextRaces = false;
        let racesCount = 0;

        for (let i = 0; i < lines.length; i++) {
          if (lines[i].toUpperCase().includes('NEXT RACES')) {
            foundNextRaces = true;
            continue;
          }
          
          if (foundNextRaces && lines[i].match(/^\d{2}:\d{2}$/)) {
            if (racesCount >= 3) break;
            
            const time = lines[i];
            const track = lines[i+1] || 'Unknown Track';
            
            let runnersHtml = '';
            let runnersCount = 0;
            
            // Search ahead for runners and odds
            for (let j = i + 2; j < i + 30 && runnersCount < 4; j++) {
              if (lines[j].toUpperCase().includes('VIEW FULL RACE')) break;
              if (lines[j].match(/^\d{2}:\d{2}$/)) break; // Stop if next race time is found

              const potentialOdds = lines[j];
              if (potentialOdds.match(/^\d+\/\d+$/) || (potentialOdds.match(/^\d+$/) && potentialOdds.length < 4)) {
                // Found something that looks like odds. 
                // Runner name is usually a few lines up.
                let runnerName = 'Unknown';
                for (let k = j-1; k > i; k--) {
                  const pRunner = lines[k];
                  if (pRunner.length > 3 && !pRunner.includes('E/W') && !pRunner.match(/^\d+$/) && pRunner !== track && pRunner !== 'J' && pRunner !== 'T') {
                    runnerName = pRunner;
                    break;
                  }
                }
                runnersHtml += `<li class="d-flex justify-content-between">
                  <span>${runnerName}</span>
                  <span class="odds-value">${potentialOdds}</span>
                </li>`;
                runnersCount++;
              }
            }

            if (runnersHtml) {
              html += `<div class="race-card">
                <h6 class="mb-2 text-primary">${time} - ${track}</h6>
                <ul class="list-unstyled mb-0" style="font-size: 0.9rem;">
                  ${runnersHtml}
                </ul>
              </div>`;
              racesCount++;
            }
          }
        }

        if (html === '') {
          // If the parser didn't find anything, show a snippet for debugging if needed
          container.innerHTML = '<div class="text-center py-3">Waiting for upcoming races...</div>';
        } else {
          container.innerHTML = html;
        }
      }

      fetchOdds();
      setInterval(fetchOdds, 15000);
    });
  </script>
</body>
</html>
